<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로또 번호 자동 추출기</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 540px;
        margin: 40px auto;
        padding: 0 20px;
        color: #333;
        background: #f7f9fc;
      }
      h1 {
        text-align: center;
        margin-bottom: 24px;
      }
      .card {
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 14px 30px rgba(0, 0, 0, 0.08);
        padding: 24px;
      }
      button {
        display: block;
        width: 100%;
        cursor: pointer;
        margin-top: 16px;
        border: none;
        border-radius: 12px;
        padding: 14px;
        background: #4a73ff;
        color: #fff;
        font-size: 1rem;
      }
      .numbers {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 20px;
      }
      .number {
        width: 60px;
        height: 60px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: #e6ebff;
        color: #2a2f41;
        font-size: 1.2rem;
        font-weight: bold;
      }
      .note {
        margin-top: 12px;
        color: #666;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>로또 번호 자동 추출기</h1>
      <p>아래 버튼을 눌러 1~45 사이의 중복 없는 로또 번호 6개를 생성합니다.</p>
      <button id="generateBtn">번호 생성</button>
      <div class="numbers" id="lottoNumbers"></div>
      <p class="note">생성된 번호는 예시일 뿐이며, 실제 당첨을 보장하지 않습니다.</p>
    </div>
    <script>
      function generateLottoNumbers() {
        const numbers = [];
        while (numbers.length < 6) {
          const candidate = Math.floor(Math.random() * 45) + 1;
          if (!numbers.includes(candidate)) {
            numbers.push(candidate);
          }
        }
        return numbers.sort((a, b) => a - b);
      }

      function renderNumbers() {
        const lottoNumbers = document.getElementById('lottoNumbers');
        lottoNumbers.innerHTML = '';

        const numbers = generateLottoNumbers();
        numbers.forEach((num) => {
          const span = document.createElement('span');
          span.className = 'number';
          span.textContent = num;
          lottoNumbers.appendChild(span);
        });
      }

      document.getElementById('generateBtn').addEventListener('click', renderNumbers);

      // 초기 생성
      renderNumbers();
    </script>
  </body>
</html>
