<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘의 명언</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: #fff;
      font-family: Arial, sans-serif;
      color: #111;
    }

    button { border: none; cursor: pointer; font-family: inherit; }

    input, textarea {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 15px;
      font-size: 16px;
      outline: none;
      margin-bottom: 10px;
    }

    textarea { resize: none; }

    .page { width: 100%; min-height: 100vh; }

    .write-box {
      min-height: 100vh;
      max-width: 620px;
      margin: 0 auto;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: center;
    }

    .write-box h1 { font-size: 42px; margin-bottom: 12px; }

    .write-box p { color: #999; margin-bottom: 14px; }

    .notice {
      font-size: 14px;
      color: #c0392b;
      background: #fff5f5;
      border: 1px solid #ffd6d6;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 22px;
      line-height: 1.5;
    }

    #messageInput { height: 140px; line-height: 1.6; }

    .count {
      text-align: right;
      color: #aaa;
      font-size: 13px;
      margin-bottom: 12px;
    }

    .full-btn {
      width: 100%;
      background: #111;
      color: #fff;
      padding: 16px;
      border-radius: 12px;
      font-size: 16px;
    }

    .share-box {
      margin-top: 15px;
      padding: 12px;
      background: #f7f7f7;
      border-radius: 12px;
      font-size: 14px;
      color: #555;
      word-break: break-all;
      display: none;
    }

    .message-screen {
      display: none;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }

    .message-center {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100%;
      max-width: 1100px;
      padding: 0 20px;
      text-align: center;
      transform: translate(-50%, -50%);
    }

    .message-wrapper {
      display: inline-block;
      max-width: 100%;
    }

    .message {
      font-size: 88px;
      font-weight: 800;
      line-height: 1.25;
      letter-spacing: -3px;
      word-break: keep-all;
      white-space: pre-wrap;
      cursor: default;
    }

    .hidden-zone {
      width: 560px;
      max-width: 90vw;
      margin: 25px auto 0;
      opacity: 0;
      transform: translateY(20px);
      pointer-events: none;
      transition: all 0.3s ease;
    }

    .message-wrapper:hover .hidden-zone {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .stats {
      color: #999;
      font-size: 14px;
      margin-bottom: 14px;
    }

    .like-btn {
      background: #f3f3f3;
      color: #111;
      padding: 10px 20px;
      border-radius: 999px;
      font-size: 14px;
      margin-bottom: 30px;
    }

    .comment-area { text-align: left; }

    #commentInput {
      height: 85px;
      line-height: 1.5;
    }

    .comments {
      margin-top: 30px;
      max-height: 240px;
      overflow-y: auto;
    }

    .comment {
      border-top: 1px solid #eee;
      padding: 16px 0;
    }

    .comment-name {
      font-weight: 700;
      margin-bottom: 6px;
    }

    .comment-text {
      color: #333;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .comment-meta {
      margin-top: 8px;
      font-size: 12px;
      color: #aaa;
    }

    .bottom-text {
      position: fixed;
      bottom: 24px;
      left: 0;
      width: 100%;
      text-align: center;
      font-size: 13px;
      color: #bbb;
    }

    .reset-btn {
      margin-left: 10px;
      background: transparent;
      color: #999;
      font-size: 13px;
    }

    @media (max-width: 600px) {
      .message {
        font-size: 52px;
        letter-spacing: -2px;
      }

      .hidden-zone {
        opacity: 1;
        transform: none;
        pointer-events: auto;
      }

      .message-center {
        position: static;
        transform: none;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
    }
  </style>
</head>

<body>

<div class="page">

  <div class="write-box" id="writeBox">
    <h1>오늘의 명언</h1>
    <p>오늘 하루 사람들에게 보여주고 싶은 문장을 남겨보세요.</p>

    <div class="notice">
      오늘의 명언은 한 번 등록하면 24시간 동안 변경할 수 없습니다.<br>
      문장은 최대 100자까지만 입력할 수 있습니다.
    </div>

    <textarea id="messageInput" maxlength="100" placeholder="예) 아빠는 언제나 네 편이다."></textarea>
    <div class="count"><span id="charCount">0</span> / 100</div>

    <button class="full-btn" onclick="createQuote()">오늘의 명언 등록하기</button>

    <div class="share-box" id="shareBox"></div>
  </div>

  <div class="message-screen" id="messageScreen">
    <div class="message-center">
      <div class="message-wrapper">

        <div class="message" id="mainMessage"></div>

        <div class="hidden-zone">
          <div class="stats">
            ❤️ 좋아요 <span id="likeCount">0</span>
            &nbsp;&nbsp;·&nbsp;&nbsp;
            👁 조회수 <span id="viewCount">0</span>
          </div>

          <button class="like-btn" onclick="addLike()">좋아요 누르기</button>

          <div class="comment-area">
            <input type="text" id="nameInput" placeholder="이름" />
            <textarea id="commentInput" placeholder="마음을 남겨주세요"></textarea>
            <button class="full-btn" onclick="addComment()">댓글 남기기</button>

            <div class="comments" id="comments"></div>
          </div>
        </div>

      </div>
    </div>

    <div class="bottom-text">
      오늘 남기고 싶은 말이 있나요?
      <button class="reset-btn" onclick="goHome()">나도 만들기</button>
    </div>
  </div>

</div>

<script>
  const SUPABASE_URL = "https://ymwstrzyeumiawhhvsyu.supabase.co";
  const SUPABASE_KEY = "sb_publishable_n5DRa5cpw2-QE5mH91G85Q_8FgzmPMe";

  const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let currentQuote = null;

  const messageInput = document.getElementById("messageInput");
  const charCount = document.getElementById("charCount");

  messageInput.addEventListener("input", () => {
    charCount.innerText = messageInput.value.length;
  });

  window.addEventListener("load", async () => {
    const params = new URLSearchParams(window.location.search);
    const slug = params.get("q");

    if (slug) {
      await loadQuote(slug);
    }
  });

  function makeSlug() {
    return Math.random().toString(36).substring(2, 8);
  }

  async function createQuote() {
    const message = messageInput.value.trim();

    if (!message) {
      alert("명언을 입력해주세요.");
      return;
    }

    if (message.length > 100) {
      alert("명언은 100자 이하만 가능합니다.");
      return;
    }

    const slug = makeSlug();

    const { data, error } = await db
      .from("quotes")
      .insert({
        slug: slug,
        message: message,
        views: 0,
        likes: 0
      })
      .select()
      .single();

    if (error) {
      alert("저장 중 오류가 발생했습니다.");
      console.error(error);
      return;
    }

    const shareUrl = `${window.location.origin}${window.location.pathname}?q=${slug}`;

    document.getElementById("shareBox").style.display = "block";
    document.getElementById("shareBox").innerHTML = `
      명언이 생성되었습니다.<br>
      아래 주소를 지인에게 보내세요.<br><br>
      ${shareUrl}
    `;

    history.pushState(null, "", `?q=${slug}`);

    await loadQuote(slug);
  }

  async function loadQuote(slug) {
    const { data, error } = await db
      .from("quotes")
      .select("*")
      .eq("slug", slug)
      .single();

    if (error || !data) {
      alert("명언을 찾을 수 없습니다.");
      return;
    }

    currentQuote = data;

    await db
      .from("quotes")
      .update({ views: data.views + 1 })
      .eq("id", data.id);

    currentQuote.views = data.views + 1;

    showQuote();
    await loadComments();
  }

  function showQuote() {
    document.getElementById("writeBox").style.display = "none";
    document.getElementById("messageScreen").style.display = "block";

    document.getElementById("mainMessage").innerText = currentQuote.message;
    document.getElementById("viewCount").innerText = currentQuote.views;
    document.getElementById("likeCount").innerText = currentQuote.likes;

    adjustFontSize();
  }

  function adjustFontSize() {
    const messageEl = document.getElementById("mainMessage");
    const length = messageEl.innerText.length;

    if (window.innerWidth <= 600) {
      if (length > 70) messageEl.style.fontSize = "34px";
      else if (length > 40) messageEl.style.fontSize = "42px";
      else messageEl.style.fontSize = "52px";
      return;
    }

    if (length > 80) messageEl.style.fontSize = "44px";
    else if (length > 60) messageEl.style.fontSize = "56px";
    else if (length > 35) messageEl.style.fontSize = "72px";
    else messageEl.style.fontSize = "88px";
  }

  async function addLike() {
    if (!currentQuote) return;

    const newLikes = currentQuote.likes + 1;

    const { error } = await db
      .from("quotes")
      .update({ likes: newLikes })
      .eq("id", currentQuote.id);

    if (error) {
      alert("좋아요 저장 실패");
      console.error(error);
      return;
    }

    currentQuote.likes = newLikes;
    document.getElementById("likeCount").innerText = newLikes;
  }

  async function addComment() {
    if (!currentQuote) return;

    const name = document.getElementById("nameInput").value.trim();
    const text = document.getElementById("commentInput").value.trim();

    if (!name || !text) {
      alert("이름과 댓글을 입력해주세요.");
      return;
    }

    const { error } = await db
      .from("comments")
      .insert({
        quote_id: currentQuote.id,
        name: name,
        comment: text
      });

    if (error) {
      alert("댓글 저장 실패");
      console.error(error);
      return;
    }

    document.getElementById("nameInput").value = "";
    document.getElementById("commentInput").value = "";

    await loadComments();
  }

  async function loadComments() {
    const { data, error } = await db
      .from("comments")
      .select("*")
      .eq("quote_id", currentQuote.id)
      .order("created_at", { ascending: false });

    if (error) {
      console.error(error);
      return;
    }

    const commentsBox = document.getElementById("comments");
    commentsBox.innerHTML = "";

    data.forEach(comment => {
      const div = document.createElement("div");
      div.className = "comment";

      div.innerHTML = `
        <div class="comment-name">${escapeHtml(comment.name)}</div>
        <div class="comment-text">${escapeHtml(comment.comment)}</div>
        <div class="comment-meta">${new Date(comment.created_at).toLocaleString()}</div>
      `;

      commentsBox.appendChild(div);
    });
  }

  function goHome() {
    window.location.href = window.location.origin + window.location.pathname;
  }

  function escapeHtml(text) {
    return text
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }
</script>

</body>
</html>
